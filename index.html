<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<style>
*,
*::before,
*::after{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Inter',sans-serif;
  overflow:hidden;
  position:relative;
}

/* BACKGROUND IMAGE */
.bg{
  position:fixed;
  inset:0;
  z-index:0;
  overflow:hidden;
}

.bg img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.bg::after{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(4,4,10,0.55);
}

/* BLOBS */
.blob{
  position:fixed;
  border-radius:50%;
  filter:blur(100px);
  pointer-events:none;
  z-index:1;
}

.blob1{
  width:400px;
  height:400px;
  background:radial-gradient(circle,rgba(99,102,241,0.15),transparent 70%);
  top:-100px;
  left:-100px;
}

.blob2{
  width:350px;
  height:350px;
  background:radial-gradient(circle,rgba(200,255,0,0.06),transparent 70%);
  bottom:-100px;
  right:-100px;
}

/* CARD */
.card{
  width:460px;
  background:rgba(12,12,18,0.85);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:24px;
  padding:2.5rem;
  position:relative;
  z-index:2;
  box-shadow:0 30px 80px rgba(0,0,0,0.6),
             inset 0 1px 0 rgba(255,255,255,0.05);
}

.card::before{
  content:'';
  position:absolute;
  top:0;
  left:15%;
  right:15%;
  height:1px;
  background:linear-gradient(
    90deg,
    transparent,
    rgba(99,102,241,0.6),
    transparent
  );
}

.card-tag{
  font-size:.65rem;
  font-weight:600;
  color:#6366f1;
  letter-spacing:.2em;
  text-transform:uppercase;
  margin-bottom:.6rem;
}

.card-title{
  font-family:'Syne',sans-serif;
  font-size:1.7rem;
  font-weight:800;
  color:#fff;
  margin-bottom:.4rem;
}

.card-subtitle{
  font-size:.82rem;
  color:rgba(255,255,255,.5);
  line-height:1.6;
}

.form{
  display:flex;
  flex-direction:column;
  gap:1.3rem;
  margin-top:2rem;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1rem;
}

.field{
  position:relative;
}

.field input,
.field textarea{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  padding:1.2rem 1rem .5rem;
  color:#fff;
  font-size:.9rem;
  outline:none;
}

.field textarea{
  height:110px;
  resize:none;
  padding-top:1.4rem;
}

.field label{
  position:absolute;
  top:50%;
  left:1rem;
  transform:translateY(-50%);
  color:rgba(255,255,255,.4);
  transition:.25s;
  pointer-events:none;
}

.field textarea ~ label{
  top:1rem;
  transform:none;
}

.field input:focus ~ label,
.field input:not(:placeholder-shown) ~ label,
.field textarea:focus ~ label,
.field textarea:not(:placeholder-shown) ~ label{
  top:.45rem;
  transform:none;
  font-size:.65rem;
  color:#6366f1;
}

.field input:focus,
.field textarea:focus{
  border-color:#6366f1;
  box-shadow:0 0 0 3px rgba(99,102,241,.12);
}

.submit-btn{
  padding:.95rem;
  border:none;
  border-radius:12px;
  background:#6366f1;
  color:#fff;
  font-family:'Syne',sans-serif;
  font-weight:700;
  cursor:pointer;
  transition:.3s;
}

.submit-btn:hover{
  background:#5355d8;
  transform:translateY(-2px);
}
</style>
</head>

<body>

<!-- CHANGE IMAGE HERE -->
<div class="bg">
  <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=2000&q=80" alt="Background">
</div>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">

  <div class="card-header">
    <div class="card-tag">GET IN TOUCH</div>
    <div class="card-title">Contact Us</div>
    <div class="card-subtitle">
      Fill in the form and we will respond within 24 hours.
    </div>
  </div>

  <div class="form">

    <div class="row">
      <div class="field">
        <input type="text" placeholder=" ">
        <label>First Name</label>
      </div>

      <div class="field">
        <input type="text" placeholder=" ">
        <label>Last Name</label>
      </div>
    </div>

    <div class="field">
      <input type="email" placeholder=" ">
      <label>Email Address</label>
    </div>

    <div class="field">
      <input type="text" placeholder=" ">
      <label>Subject</label>
    </div>

    <div class="field">
      <textarea placeholder=" "></textarea>
      <label>Your Message</label>
    </div>

    <button class="submit-btn">
      Send Message
    </button>

  </div>

</div>

</body>
</html>
